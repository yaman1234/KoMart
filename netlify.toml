[build]
  base    = "frontend"
  publish = "dist"
  command = "npm run build"

[build.environment]
  NODE_VERSION = "20"

# SPA fallback — all routes served by index.html
[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200

# Proxy /api/* to the backend (set VITE_API_BASE_URL env var instead for production)
# Uncomment and replace <YOUR_BACKEND_URL> if you want Netlify to proxy API calls
# [[redirects]]
#   from   = "/api/*"
#   to     = "https://<YOUR_BACKEND_URL>/api/:splat"
#   status = 200
#   force  = true

[context.production.environment]
  VITE_APP_ENV = "production"
  # Set in Netlify UI (required): VITE_API_BASE_URL = https://ko-mart.vercel.app/api/v1
  # Optional: enable Netlify /api proxy instead of baking the URL into the build (see redirects above).
